<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实验代码 — 国际方向计算机课程</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">
  <site-nav active="projects"></site-nav>

  <main class="page-content container py-5">
    <h2 class="section-title text-center">实验代码专区</h2>
    <p class="section-subtitle text-center">结构化的课程项目案例，方便查阅、复刻与迭代优化</p>

    <div v-if="loading" class="text-center text-muted py-5">
      <div class="spinner-border text-primary mb-3" role="status"></div>
      <p>加载项目数据...</p>
    </div>

    <div v-else>
      <!--
      ★ 学生开发区域 ★
      功能要点：
      1. 按课程体系筛选（IGCSE / A Level / AP）
      2. 项目卡片：简介、功能需求、重难点标签、源码/在线运行链接

      数据已加载到 this.projects
      数据结构参考 data/projects.json
      -->
      <div class="row justify-content-center">
        <div class="col-lg-8 text-center text-muted py-5">
          <i class="bi bi-code-square display-1 d-block mb-3"></i>
          <p>【实验代码专区 — 待学生开发】</p>
          <p class="small">数据已加载成功！共 {{ projects.length }} 个项目。</p>
          <p class="small">数据文件：<code>data/projects.json</code></p>
        </div>
      </div>
    </div>
  </main>

  <site-footer></site-footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
<script src="js/config.js"></script>
<script src="js/nav.js"></script>
<script src="js/footer.js"></script>

<script>
Vue.createApp({
  components: { SiteNav, SiteFooter },

  data() {
    return {
      projects: [],
      loading: true,
      // ★ 学生在这里添加：filterSystem 等筛选状态
    }
  },

  mounted() {
    fetch('data/projects.json')
      .then(function (res) { return res.json() })
      .then(function (data) {
        this.projects = data
        this.loading = false
      }.bind(this))
      .catch(function (err) {
        console.error('项目数据加载失败:', err)
        this.loading = false
      }.bind(this))
  },
}).mount('#app')
</script>
</body>
</html>
