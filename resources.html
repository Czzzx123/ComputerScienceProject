<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>资料下载 — 国际方向计算机课程</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">
  <site-nav active="resources"></site-nav>

  <main class="page-content container py-5">
    <h2 class="section-title text-center">资料下载</h2>
    <p class="section-subtitle text-center">按课程体系分类归档，支持在线预览与一键下载</p>

    <div v-if="loading" class="text-center text-muted py-5">
      <div class="spinner-border text-primary mb-3" role="status"></div>
      <p>加载资源数据...</p>
    </div>

    <div v-else>
      <!--
      ★ 学生开发区域 ★
      功能要点：
      1. 按课程体系筛选（AP / A Level / IGCSE）
      2. 按资料类型筛选（考纲 / 样卷 / 评分标准）
      3. 资源列表展示，含版本号、更新时间、预览/下载按钮

      数据已加载到 this.resources
      数据结构参考 data/resources.json
      -->
      <div class="row justify-content-center">
        <div class="col-lg-8 text-center text-muted py-5">
          <i class="bi bi-download display-1 d-block mb-3"></i>
          <p>【资料下载页面 — 待学生开发】</p>
          <p class="small">数据已加载成功！共 {{ resources.length }} 条资源。</p>
          <p class="small">数据文件：<code>data/resources.json</code></p>
        </div>
      </div>
    </div>
  </main>

  <site-footer></site-footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.js"></script>
<script src="js/config.js"></script>
<script src="js/nav.js"></script>
<script src="js/footer.js"></script>

<script>
Vue.createApp({
  components: { SiteNav, SiteFooter },

  data() {
    return {
      resources: [],
      loading: true,
      // ★ 学生在这里添加：filterSystem, filterType 等筛选状态
    }
  },

  mounted() {
    fetch('data/resources.json')
      .then(function (res) { return res.json() })
      .then(function (data) {
        this.resources = data
        this.loading = false
      }.bind(this))
      .catch(function (err) {
        console.error('资源数据加载失败:', err)
        this.loading = false
      }.bind(this))
  },
}).mount('#app')
</script>
</body>
</html>
